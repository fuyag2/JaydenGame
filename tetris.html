<html>
<head>
  <link rel="stylesheet" href="tetris.css">
  <title>Tetrablocks</title>
</head>
<body>
  <a href="main.html" class="back-btn">← Back</a>
  <div class="game-title">TETRA BLOCK GAME</div>
  <div class="game-subtitle">CLASSIC PUZZLE</div>
  <div class="game-wrapper">
    <div id="tetris-board"></div>
    <div class="side-panel">
      <div class="panel-card">
        <div class="panel-label">Score</div>
        <div class="score-value" id="output">0</div>
      </div>
      <button id="redbutton" onclick="startGame()">▶ Start Game</button>
      <div class="panel-card">
        <div class="panel-label">Controls</div>
        <ul class="controls-list">
          <li><span>Rotate</span><span class="key-badge">↑</span></li>
          <li><span>Move left</span><span class="key-badge">←</span></li>
          <li><span>Move right</span><span class="key-badge">→</span></li>
          <li><span>Soft drop</span><span class="key-badge">↓</span></li>
        </ul>
      </div>
    </div>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
