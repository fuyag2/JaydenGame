<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayden's Games</title>
    <style type="text/css">
        :root {
            --card-bg: rgba(255, 255, 255, 0.92); 
            --primary: #f9f9f9;
            --text-main: #f9f9f9;
            --border-width: 3px;
        }
        
        body {
            text-align: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('https://as1.ftcdn.net/jpg/05/99/72/06/1000_F_599720625_N2U8AQzhS5y7llrp2AMAQmKL4B6nWHKT.webp');
            background-size: 110%;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            font-weight: 900;
            text-shadow: 2px 2px 0px #000; /* Added a little shadow for readability */
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Smaller Button Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Smaller Button Style */
        .nav-btn {
            width: 100%;
            height: 50px; /* Reduced from 80px */
            background-color: var(--card-bg);
            border: var(--border-width) solid black;
            border-radius: 10px;
            font-size: 16px; /* Reduced from 20px */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 4px 4px 0px var(--primary);
            background-color: #f8fafc;
        }

        .nav-btn:active {
            transform: translate(0, 0);
            box-shadow: 0px 0px 0px black;
        }

        .about-section {
            background-color: var(--card-bg);
            padding: 25px;
            border: var(--border-width) solid black;
            border-radius: 20px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        .about-section h2 {
            margin-top: 0;
            font-size: 24px;
            text-decoration: underline;
        }

        .about-section p {
            font-size: 16px;
            line-height: 1.5;
            color: #4b5563;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        @media (max-width: 480px) {
            .game-grid { 
                grid-template-columns: 1fr; 
                max-width: 250px; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JAYDEN'S GAMES</h1>

        <div class="game-grid">
            <a href = "tetris.html">
                <button class="nav-btn">🧱 Tetris</button>
            </a>

            <a href = "snakegamev2.html">
            <button class="nav-btn">🐍 Snake</button>
            </a>

            <a href="mine_sweeperv2.html">
                <button class="nav-btn">💣 Mine Sweeper</button>
            </a>
        </div>

        <div class="about-section">
            <h2>About Us</h2>
            <p>
                Experience a collection of handcrafted arcade classics. 
                From the tension of <strong>Mine Sweeper</strong> to the precision of 
                <strong>Tetris</strong>, every game is built for speed and high-score hunting.
            </p>
        </div>
    </div>

</body>
</html>
